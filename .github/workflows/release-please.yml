name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      app_release_created: ${{ steps.release.outputs['apps/agent-please--release_created'] }}
      core_release_created: ${{ steps.release.outputs['packages/core--release_created'] }}
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-app:
    needs: release-please
    if: ${{ needs.release-please.outputs.app_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Copy root files into package directory
        run: cp LICENSE README.md apps/agent-please/

      - name: 'Pack with bun (resolves workspace: protocol)'
        run: bun pm pack --ignore-scripts
        working-directory: apps/agent-please

      - name: Publish tarball with npm (supports --provenance)
        run: npm publish pleaseai-agent-*.tgz --provenance --access public
        working-directory: apps/agent-please

  publish-core:
    needs: release-please
    if: ${{ needs.release-please.outputs.core_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Copy root files into package directory
        run: cp LICENSE README.md packages/core/

      - name: 'Pack with bun (resolves workspace: protocol)'
        run: bun pm pack --ignore-scripts
        working-directory: packages/core

      - name: Publish tarball with npm (supports --provenance)
        run: npm publish pleaseai-agent-core-*.tgz --provenance --access public
        working-directory: packages/core
